name: Update ProtonVPN servers

# Refreshes the `protonvpn-servers` GH release asset (servers.json)
# by authenticating against ProtonVPN's account API (SRP v4 via
# OpenBao-supplied creds) over a Cloudflare WARP-routed egress and
# fetching /vpn/v1/logicals. The tundler-protonvpn image build
# downloads from that release at image-build time and drops it at
# /etc/protonvpn/servers.json (read by the runtime provider).
#
# Architecture rationale:
#   - WARP routes the runner's egress so api.proton.me's anti-
#     abuse scoring (which clamps the GitHub Actions runner IP
#     range with frequent CAPTCHA challenges) gets a cleaner
#     source IP.
#   - Publishing to a GH release (vs committing servers.json to
#     git) keeps the ~2 MB JSON out of repo history and out of
#     every non-proton image.
#   - SRP code stays out of production — auth happens here only,
#     not on the tunnel pods.
#
# Auth: vault-action exchanges this workflow's GitHub OIDC token
# for a short-lived OpenBao token via the `tundler` role configured
# in the `lpellegr` namespace. Role + narrow-scope policy are
# managed by elaunira-openbao/scripts/configure-github-jwt.sh —
# PERSONAL_ROLES["lpellegr|tundler"].

on:
  schedule:
    # 06:00 UTC daily — well after Proton's nightly catalog churn
    # but early enough that any downstream image rebuild lands
    # before business hours in EU/US.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write   # upload to the GH release
  id-token: write   # for vault-action JWT auth

concurrency:
  group: update-proton-servers
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_TAG: protonvpn-servers
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Cloudflare WARP
        uses: ./.github/actions/setup-cloudflare-warp

      - name: Fetch ProtonVPN account credentials from OpenBao
        uses: hashicorp/vault-action@v3
        with:
          url: https://bao.elaunira.com
          method: jwt
          path: github-actions
          role: tundler
          namespace: lpellegr
          jwtGithubAudience: https://github.com/laurentpellegrino
          secrets: |
            kv/data/vpn/proton username | PROTON_ACCOUNT_USERNAME ;
            kv/data/vpn/proton password | PROTON_ACCOUNT_PASSWORD

      - name: Run proton-updater
        run: |
          set -euo pipefail
          go run ./cmd/proton-updater > /tmp/fresh.json
          # Validate it's actual JSON (catches HTML 4xx pages /
          # Proton "please complete CAPTCHA" responses if the
          # updater somehow returns 0 anyway).
          python3 -c "import json; d=json.load(open('/tmp/fresh.json')); assert d.get('protonvpn', {}).get('servers'), 'no servers in response'; print(f'fetched {len(d[\"protonvpn\"][\"servers\"])} server entries')"

      - name: Skip when checksum matches current release
        id: skip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release download "$RELEASE_TAG" --pattern servers.json --dir /tmp/current 2>/dev/null; then
            FRESH_SUM=$(sha256sum /tmp/fresh.json | awk '{print $1}')
            CURR_SUM=$(sha256sum /tmp/current/servers.json | awk '{print $1}')
            if [[ "$FRESH_SUM" == "$CURR_SUM" ]]; then
              echo "Servers unchanged (sha256 match); nothing to publish."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "Servers changed: $CURR_SUM → $FRESH_SUM"
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No existing release asset yet; publishing initial."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        if: steps.skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --title "ProtonVPN server catalog (api.proton.me mirror)" \
                --notes "Daily mirror of api.proton.me/vpn/v1/logicals. See update-proton-servers.yml."
          mv /tmp/fresh.json /tmp/servers.json
          gh release upload "$RELEASE_TAG" /tmp/servers.json --clobber --repo "$GITHUB_REPOSITORY"
          echo "::notice::Refreshed ${RELEASE_TAG} servers.json"
