name: Update ProtonVPN servers

# Refreshes the `protonvpn-servers` GH release asset (servers.json)
# by refreshing a stored ProtonVPN session (no SRP login in CI)
# over a Cloudflare WARP-routed egress and fetching
# /vpn/v1/logicals. The tundler-protonvpn image build
# downloads from that release at image-build time and drops it at
# /etc/protonvpn/servers.json (read by the runtime provider).
#
# Architecture rationale:
#   - WARP routes the runner's egress so api.proton.me's anti-
#     abuse scoring (which clamps the GitHub Actions runner IP
#     range with frequent CAPTCHA challenges) gets a cleaner
#     source IP.
#   - Publishing to a GH release (vs committing servers.json to
#     git) keeps the ~2 MB JSON out of repo history and out of
#     every non-proton image.
#   - SRP code stays out of production — auth happens here only,
#     not on the tunnel pods.
#
# Auth: the Proton session (uid + refresh token) lives in GitHub
# Actions secrets. Proton ROTATES the refresh token on every use,
# so after each run the rotated token is written back via
# `gh secret set`, which needs GH_SECRETS_PAT (fine-grained PAT,
# Secrets read/write on this repo) — the default GITHUB_TOKEN
# cannot modify repo secrets. Seed/re-seed the session with
# `proton-updater -login` (see cmd/proton-updater).

on:
  schedule:
    # 06:00 UTC daily — well after Proton's nightly catalog churn
    # but early enough that any downstream image rebuild lands
    # before business hours in EU/US.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write   # upload to the GH release

concurrency:
  group: update-proton-servers
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_TAG: protonvpn-servers
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Cloudflare WARP
        uses: ./.github/actions/setup-cloudflare-warp

      - name: Run proton-updater
        env:
          # Refresh mode: reuse the stored session (no SRP login → no CAPTCHA).
          # The (possibly rotated) refresh token is written here for write-back.
          PROTON_SESSION_OUT: /tmp/proton-session.json
          PROTON_SESSION_UID: ${{ secrets.PROTON_SESSION_UID }}
          PROTON_SESSION_REFRESH_TOKEN: ${{ secrets.PROTON_SESSION_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          go run ./cmd/proton-updater > /tmp/servers.json
          # Validate it's actual JSON (catches HTML 4xx pages / unexpected
          # non-JSON if the API path ever returns one despite exit 0).
          python3 -c "import json; d=json.load(open('/tmp/servers.json')); assert d.get('protonvpn', {}).get('servers'), 'no servers in response'; print(f'fetched {len(d[\"protonvpn\"][\"servers\"])} server entries')"

      - name: Persist rotated session to repo secrets
        if: always()
        env:
          # Fine-grained PAT with Secrets read/write on this repo — the
          # default GITHUB_TOKEN cannot modify Actions secrets.
          GH_TOKEN: ${{ secrets.GH_SECRETS_PAT }}
        run: |
          set -euo pipefail
          if [[ ! -f /tmp/proton-session.json ]]; then
            echo "no rotated session file (refresh did not run); skipping write-back"
            exit 0
          fi
          NEW_UID=$(jq -r .uid /tmp/proton-session.json)
          NEW_RT=$(jq -r .refresh_token /tmp/proton-session.json)
          echo "::add-mask::$NEW_RT"
          # Proton rotates the refresh token on use; persist it or the next
          # run's stored token is already consumed and refresh fails.
          gh secret set PROTON_SESSION_UID --repo "$GITHUB_REPOSITORY" --body "$NEW_UID"
          gh secret set PROTON_SESSION_REFRESH_TOKEN --repo "$GITHUB_REPOSITORY" --body "$NEW_RT"
          echo "Rotated session persisted to repo secrets."

      - name: Skip when checksum matches current release
        id: skip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release download "$RELEASE_TAG" --pattern servers.json --dir /tmp/current 2>/dev/null; then
            FRESH_SUM=$(sha256sum /tmp/servers.json | awk '{print $1}')
            CURR_SUM=$(sha256sum /tmp/current/servers.json | awk '{print $1}')
            if [[ "$FRESH_SUM" == "$CURR_SUM" ]]; then
              echo "Servers unchanged (sha256 match); nothing to publish."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "Servers changed: $CURR_SUM → $FRESH_SUM"
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No existing release asset yet; publishing initial."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        if: steps.skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --title "ProtonVPN server catalog (api.proton.me mirror)" \
                --notes "Daily mirror of api.proton.me/vpn/v1/logicals. See update-proton-servers.yml."
          gh release upload "$RELEASE_TAG" /tmp/servers.json --clobber --repo "$GITHUB_REPOSITORY"
          echo "::notice::Refreshed ${RELEASE_TAG} servers.json"
