name: Build and publish Docker images

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Daily rebuild at 07:00 UTC. Two reasons:
    # 1. Pick up upstream base-image security updates without needing
    #    a code-change push.
    # 2. Re-bake the protonvpn image with the freshest embedded
    #    servers.json. The update-proton-servers workflow runs at
    #    06:00 UTC and (when content changed) commits to main, which
    #    already triggers this workflow via the push branch; the
    #    schedule keeps the image current on days where the catalog
    #    is unchanged.
    - cron: '0 7 * * *'

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...

  # Per-provider tunnel images. One image per VPN provider, each
  # containing only that provider's CLI + the tundler-tunnel binary.
  # Consumed by the per-provider StatefulSets in
  # ipregistry-kubernetes/clusters/production/ipregistry-crawl/
  # statefulset-tundler-tunnel-<provider>.yaml.
  build-tundler-tunnel:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: [cyberghost, expressvpn, fastvpn, ipvanish, mullvad, nordvpn, ovpn, pia, protonvpn, psiphon, purevpn, surfshark, tunnelbear, veepn, warp, windscribe]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # ExpressVPN's CDN serves a Cloudflare block page to GitHub Actions
      # runner IPs, so the in-build curl gets HTML instead of the .run. Same
      # fix as the proton/ipvanish refresh workflows: route the runner's
      # egress through Cloudflare WARP and prefetch the official installer
      # on the runner, then hand it to the build (install.sh prefers the
      # prefetched file). The version/URL lives only in install.sh.
      - name: Setup Cloudflare WARP (expressvpn)
        if: matrix.provider == 'expressvpn'
        uses: ./.github/actions/setup-cloudflare-warp
      - name: Prefetch ExpressVPN installer via WARP
        if: matrix.provider == 'expressvpn'
        run: |
          set -euo pipefail
          URL=$(grep -E '^URL=' docker/providers/expressvpn/install.sh | head -1 | cut -d'"' -f2)
          OUT=docker/providers/expressvpn/expressvpn-prefetched.run
          echo "Prefetching $URL through WARP..."
          curl -fL --max-time 600 \
            -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36" \
            -o "$OUT" "$URL"
          SZ=$(stat -c%s "$OUT"); FIRST=$(head -c1 "$OUT")
          if [ "$SZ" -le 1000000 ] || [ "$FIRST" = "<" ]; then
            echo "::error::Prefetched installer is invalid ($SZ bytes, first='$FIRST') — WARP egress still blocked?"
            head -c 300 "$OUT" || true
            exit 1
          fi
          echo "Prefetched installer: $SZ bytes"
      # Disconnect WARP before the build: the full WARP tunnel breaks the
      # build's other downloads (go mod download can't reach the Go module
      # proxy through WARP). The installer is already on disk, so the build
      # uses it without touching ExpressVPN's CDN.
      - name: Disconnect WARP before build
        if: matrix.provider == 'expressvpn'
        run: sudo warp-cli --accept-tos disconnect || true
      - name: Build and push tundler-${{ matrix.provider }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.tunnel
          push: true
          build-args: |
            PROVIDER=${{ matrix.provider }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/tundler-${{ matrix.provider }}:latest
            ghcr.io/${{ github.repository_owner }}/tundler-${{ matrix.provider }}:${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/tundler-${{ matrix.provider }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/tundler-${{ matrix.provider }}:${{ github.sha }}
