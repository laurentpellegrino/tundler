name: Build and publish Docker images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...

  # Legacy all-providers image. Kept on the build path until the VPN-hub
  # cutover (design doc Phase 6) retires the in-pod tundler sidecar.
  # Builds laurentpellegrino/tundler:latest from docker/Dockerfile (the
  # cmd/tundler-api binary + every provider's install.sh).
  build-tundler-api:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tundler:latest
            ghcr.io/${{ github.repository_owner }}/tundler:${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/tundler:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/tundler:${{ github.sha }}

  # New per-provider tunnel images. One image per VPN provider, each
  # containing only that provider's CLI + the tundler-tunnel binary.
  # Consumed by the per-provider StatefulSets in the VPN-hub
  # architecture (ipregistry-kubernetes/clusters/production/ipregistry-crawl/
  # statefulset-vpn-tunnel-<provider>.yaml).
  build-tundler-tunnel:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: [expressvpn, ipvanish, mullvad, nordvpn, pia, protonvpn, surfshark]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push tundler-${{ matrix.provider }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.tunnel
          push: true
          build-args: |
            PROVIDER=${{ matrix.provider }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/tundler-${{ matrix.provider }}:latest
            ghcr.io/${{ github.repository_owner }}/tundler-${{ matrix.provider }}:${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/tundler-${{ matrix.provider }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/tundler-${{ matrix.provider }}:${{ github.sha }}

  # Hub sidecar — runs alongside envoy in the tundler-fleet-controller
  # Deployment. Pure Go binary, distroless static base, ~80 MB.
  build-tundler-fleet-controller:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.fleet-controller
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tundler-fleet-controller:latest
            ghcr.io/${{ github.repository_owner }}/tundler-fleet-controller:${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/tundler-fleet-controller:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/tundler-fleet-controller:${{ github.sha }}
