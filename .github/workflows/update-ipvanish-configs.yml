name: Update IPVanish configs

# Refreshes the `ipvanish-configs` release asset (configs.zip) by
# pulling it daily from configs.ipvanish.com via Cloudflare WARP.
# Each tundler-ipvanish image build (docker-image.yml) downloads
# from that release at build time and bakes the .ovpn files into
# the image, so a fresh release here means the next daily image
# rebuild ships the current server list.
#
# Why WARP: configs.ipvanish.com sits behind Cloudflare and 403s
# many cloud/datacenter egress IPs — in particular the GitHub
# Actions runner pool. Routing the runner's egress through
# Cloudflare WARP (free consumer tier) makes the outbound IP
# appear as Cloudflare's own network, which Cloudflare's bot
# heuristics naturally don't block. No account / Zero Trust
# enrolment needed.
#
# Security: only external input is the configs.zip URL. The
# downloaded archive is validated via `unzip -t` + a minimum
# .ovpn entry count before being uploaded — guards against
# accepting a Cloudflare interstitial HTML page or empty file
# as if it were configs.zip.

on:
  schedule:
    # 05:00 UTC daily — earlier than the docker-image rebuild at
    # 07:00 UTC so the image picks up any new release the same day.
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write   # required to upload the release asset

concurrency:
  group: update-ipvanish-configs
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      CONFIGS_URL: https://configs.ipvanish.com/configs/configs.zip
      RELEASE_TAG: ipvanish-configs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install + connect Cloudflare WARP
        run: |
          set -euo pipefail
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor \
                --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
          sudo apt-get -qq update
          sudo apt-get -qq install -y cloudflare-warp
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode warp
          sudo warp-cli --accept-tos connect
          # Block until traffic is actually flowing through WARP.
          for i in $(seq 1 30); do
            if curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -q '^warp=on'; then
              echo "WARP connected"
              break
            fi
            sleep 2
          done
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -E '^(ip|warp|h|colo)='

      - name: Download fresh configs.zip via WARP
        run: |
          set -euo pipefail
          curl -fsSL --max-time 120 "$CONFIGS_URL" -o /tmp/fresh.zip
          # Reject Cloudflare interstitials / HTML pages dressed up
          # as configs.zip. `unzip -t` exits non-zero on anything
          # that isn't a valid zip stream.
          unzip -tq /tmp/fresh.zip
          # Sanity-check that the archive actually contains .ovpn
          # files — protects against a future server-side change
          # that returns a valid zip with the wrong contents.
          COUNT=$(unzip -l /tmp/fresh.zip 'ipvanish-*.ovpn' 2>/dev/null \
                  | awk '/[0-9]+ files?$/ {print $1}')
          if [[ -z "$COUNT" ]] || [[ "$COUNT" -lt 100 ]]; then
            echo "::error::Fresh configs.zip only contains ${COUNT:-0} ipvanish-*.ovpn entries; refusing to publish"
            exit 1
          fi
          echo "Fresh configs.zip: $COUNT server configs"

      - name: Skip when checksum matches current release
        id: skip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release download "$RELEASE_TAG" --pattern configs.zip --dir /tmp/current 2>/dev/null; then
            FRESH_SUM=$(sha256sum /tmp/fresh.zip | awk '{print $1}')
            CURR_SUM=$(sha256sum /tmp/current/configs.zip | awk '{print $1}')
            if [[ "$FRESH_SUM" == "$CURR_SUM" ]]; then
              echo "Configs unchanged (sha256 match); nothing to publish."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "Configs changed: $CURR_SUM → $FRESH_SUM"
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No existing release asset yet; publishing initial."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        if: steps.skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" /tmp/fresh.zip --clobber --repo "$GITHUB_REPOSITORY"
          echo "::notice::Refreshed ${RELEASE_TAG} configs.zip"

      - name: Disconnect WARP
        if: always()
        run: |
          sudo warp-cli --accept-tos disconnect || true
