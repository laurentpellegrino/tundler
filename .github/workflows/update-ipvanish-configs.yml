name: Update IPVanish configs

# Refreshes docker/providers/ipvanish/configs.zip by pulling it
# daily from configs.ipvanish.com via Cloudflare WARP. Commits the
# updated file directly to main when content changed; the next
# docker-image.yml rebuild (07:00 UTC daily, or on push) bakes
# the new server list into the tundler-ipvanish image.
#
# Why WARP: configs.ipvanish.com sits behind Cloudflare bot-
# protection that 403s GitHub Actions runner IPs. The composite
# action setup-cloudflare-warp routes the runner's outbound IP
# through Cloudflare's own network so the request is whitelisted.
#
# Security: the only external input is the configs.zip URL. The
# archive is validated (`unzip -t` + minimum-entry-count guard)
# before being committed — protects against accepting a
# Cloudflare interstitial or empty file as if it were configs.

on:
  schedule:
    # 05:00 UTC daily — earlier than the docker-image 07:00 UTC
    # rebuild so a content change here triggers a same-day image
    # build (via the auto-trigger on push to main).
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write   # commit the regenerated configs.zip

concurrency:
  group: update-ipvanish-configs
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      CONFIGS_URL: https://configs.ipvanish.com/configs/configs.zip
      REPO_PATH: docker/providers/ipvanish/configs.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Cloudflare WARP
        uses: ./.github/actions/setup-cloudflare-warp

      - name: Download + validate fresh configs.zip
        run: |
          set -euo pipefail
          curl -fsSL --max-time 120 "$CONFIGS_URL" -o /tmp/fresh.zip
          # Reject Cloudflare interstitials / HTML pages dressed
          # up as configs.zip. `unzip -t` exits non-zero on
          # anything that isn't a valid zip stream.
          unzip -tq /tmp/fresh.zip
          # Sanity-check that the archive contains a credible
          # number of .ovpn entries.
          COUNT=$(unzip -l /tmp/fresh.zip 'ipvanish-*.ovpn' 2>/dev/null \
                  | awk '/[0-9]+ files?$/ {print $1}')
          if [[ -z "$COUNT" ]] || [[ "$COUNT" -lt 100 ]]; then
            echo "::error::Fresh configs.zip only contains ${COUNT:-0} ipvanish-*.ovpn entries; refusing to publish"
            exit 1
          fi
          echo "Fresh configs.zip: $COUNT server configs"

      - name: Commit if content changed
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$REPO_PATH")"
          mv /tmp/fresh.zip "$REPO_PATH"
          if git diff --quiet -- "$REPO_PATH"; then
            echo "configs.zip unchanged; nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$REPO_PATH"
          # Diff stat is unhelpful for binary archives; include the
          # entry count instead so the log line stays informative.
          ENTRIES=$(unzip -l "$REPO_PATH" 'ipvanish-*.ovpn' 2>/dev/null \
                    | awk '/[0-9]+ files?$/ {print $1}')
          git commit -m "ipvanish: refresh baked configs.zip (${ENTRIES} servers)"
          git push origin main
