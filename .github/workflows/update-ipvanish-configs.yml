name: Update IPVanish configs

# Refreshes the `ipvanish-configs` GH release asset (configs.zip)
# by pulling it daily from configs.ipvanish.com via Cloudflare WARP.
# The tundler-ipvanish image build downloads from that release at
# image-build time and bakes the .ovpn files in.
#
# Architecture rationale:
#   - WARP routes the runner's egress so the Cloudflare bot-block
#     on configs.ipvanish.com (which 403s GitHub Actions runner
#     IPs) doesn't trigger.
#   - Publishing to a GH release (vs committing the bytes to the
#     repo) keeps the binary blob out of git history.
#   - The image build step downloads from the GH release CDN which
#     is reachable from any IP — so the WARP requirement is
#     confined to this daily refresh job.
#
# Security: the only external input is the configs.zip URL. The
# archive is validated (`unzip -t` + minimum-entry-count guard)
# before being published.

on:
  schedule:
    # 05:00 UTC daily — earlier than the docker-image 07:00 UTC
    # rebuild so an image rebuild the same morning picks up new
    # configs (the docker-image workflow re-pulls from the release
    # at every build).
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write   # upload to the GH release

concurrency:
  group: update-ipvanish-configs
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      CONFIGS_URL: https://configs.ipvanish.com/configs/configs.zip
      RELEASE_TAG: ipvanish-configs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Cloudflare WARP
        uses: ./.github/actions/setup-cloudflare-warp

      - name: Download + validate fresh configs.zip
        run: |
          set -euo pipefail
          curl -fsSL --max-time 120 "$CONFIGS_URL" -o /tmp/configs.zip
          # Reject Cloudflare interstitials / HTML pages dressed
          # up as configs.zip.
          unzip -tq /tmp/configs.zip
          COUNT=$(unzip -l /tmp/configs.zip 'ipvanish-*.ovpn' 2>/dev/null \
                  | awk '/[0-9]+ files?$/ {print $1}')
          if [[ -z "$COUNT" ]] || [[ "$COUNT" -lt 100 ]]; then
            echo "::error::Fresh configs.zip only contains ${COUNT:-0} ipvanish-*.ovpn entries; refusing to publish"
            exit 1
          fi
          echo "Fresh configs.zip: $COUNT server configs"

      - name: Skip when checksum matches current release
        id: skip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release download "$RELEASE_TAG" --pattern configs.zip --dir /tmp/current 2>/dev/null; then
            FRESH_SUM=$(sha256sum /tmp/configs.zip | awk '{print $1}')
            CURR_SUM=$(sha256sum /tmp/current/configs.zip | awk '{print $1}')
            if [[ "$FRESH_SUM" == "$CURR_SUM" ]]; then
              echo "Configs unchanged (sha256 match); nothing to publish."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "Configs changed: $CURR_SUM → $FRESH_SUM"
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No existing release asset yet; publishing initial."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        if: steps.skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Create the release if it doesn't exist yet (first run).
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --title "IPVanish OpenVPN configs (mirror)" \
                --notes "Daily mirror of configs.ipvanish.com/configs/configs.zip. See update-ipvanish-configs.yml."
          gh release upload "$RELEASE_TAG" /tmp/configs.zip --clobber --repo "$GITHUB_REPOSITORY"
          echo "::notice::Refreshed ${RELEASE_TAG} configs.zip"
