# Per-pod envoy bootstrap for the tunnel-pod sibling envoy.
#
# All resources are STATIC — the cluster, listener, filters, and most
# response headers are defined here at parse time. The only thing that
# changes at runtime is the x-tundler-exit-ip response header, injected
# by a Lua filter that reads `/run/tundler/exit-ip` on each response.
#
# Why static instead of xDS: the previous design had envoy subscribe to
# an xDS server inside the sibling tundler-tunnel container. Whenever
# tundler-tunnel restarted (for any reason — VPN wedge, /livez fire,
# image roll), envoy's xDS stream broke. During the reconnect window
# envoy became briefly slow to accept new TCP probes, kubelet's
# liveness probe occasionally killed it, and the whole pod cycled.
# By making envoy fully self-sufficient post-startup, tundler-tunnel
# restarts cost envoy nothing.
#
# `/run/tundler/exit-ip` is in the pod-level `run` emptyDir which
# both containers mount, so tundler-tunnel's writes are visible to
# envoy with zero IPC. tundler-tunnel writes the file on every
# successful Connect/rotation.

node:
  id: tundler-tunnel
  cluster: tundler-tunnel

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:

  listeners:
    - name: data_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8484
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                upgrade_configs:
                  - upgrade_type: CONNECT
                route_config:
                  name: tundler_tunnel_routes
                  virtual_hosts:
                    - name: all
                      domains: ["*"]
                      response_headers_to_add:
                        # tunnel-id and node-ip are static per pod —
                        # substituted from env vars at parse time. The
                        # exit-ip is dynamic and injected by the Lua
                        # filter below (envoy's %ENV(...)% formatter is
                        # only resolved at parse, so a per-rotation
                        # value can't go here).
                        - header:
                            key: "x-tundler-tunnel-id"
                            value: "%ENV(POD_NAME)%"
                        - header:
                            key: "x-tundler-node-ip"
                            value: "%ENV(NODE_IP)%"
                      routes:
                        # CONNECT path (HTTPS forward-proxy)
                        - match:
                            connect_matcher: {}
                          route:
                            cluster: vpn-upstream
                            upgrade_configs:
                              - upgrade_type: CONNECT
                                connect_config: {}
                        # Plain HTTP forward-proxy fallback
                        - match:
                            prefix: "/"
                          route:
                            cluster: vpn-upstream
                http_filters:
                  - name: envoy.filters.http.dynamic_forward_proxy
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                      dns_cache_config:
                        name: dynamic_forward_proxy_cache
                        dns_lookup_family: V4_ONLY
                        host_ttl: 3600s
                        dns_refresh_rate: 1800s
                        dns_failure_refresh_rate:
                          base_interval: 1s
                          max_interval: 5s
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        # Inject x-tundler-exit-ip from the shared file.
                        # /run/tundler/exit-ip is written by tundler-
                        # tunnel after every successful Connect. Linux
                        # page cache makes this a sub-µs read in steady
                        # state — no measurable impact on request
                        # throughput. Missing file = no header, which
                        # the hub envoy treats as "exit IP unknown"
                        # (acceptable transient during initial boot
                        # before first Connect).
                        inline_string: |
                          function envoy_on_response(response_handle)
                            local f = io.open("/run/tundler/exit-ip", "r")
                            if not f then return end
                            local ip = f:read("*line")
                            f:close()
                            if ip and ip ~= "" then
                              response_handle:headers():add("x-tundler-exit-ip", ip)
                            end
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: vpn-upstream
      connect_timeout: 5s
      lb_policy: CLUSTER_PROVIDED
      cluster_type:
        name: envoy.clusters.dynamic_forward_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
          dns_cache_config:
            name: dynamic_forward_proxy_cache
            dns_lookup_family: V4_ONLY
            host_ttl: 3600s
            dns_refresh_rate: 1800s
            dns_failure_refresh_rate:
              base_interval: 1s
              max_interval: 5s
